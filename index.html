<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080f0a">
  <meta name="description" content="💰 Money Reminder AI - Track expenses, income, debts, bills & budgets with AI insights">
  <meta name="keywords" content="money, finance, budget, expenses, income, ai, reminder">
  
  <!-- Apple Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Money Reminder AI">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2322c55e' width='180' height='180'/><text x='90' y='95' font-size='100' font-weight='bold' text-anchor='middle' dy='.3em' fill='white'>💰</text></svg>">
  
  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2322c55e' width='100' height='100'/><text x='50' y='60' font-size='70' text-anchor='middle' fill='white'>💰</text></svg>">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <title>💰 Money Reminder AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      background: #080f0a;
      color: #f0fdf4;
      font-family: 'Nunito', 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    
    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    input, select, textarea, button {
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }
    
    button {
      -webkit-user-select: none;
      user-select: none;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #4d7a55;
      border-radius: 3px;
    }
    
    /* Loading */
    .app-loading {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080f0a;
      flex-direction: column;
      gap: 20px;
    }
    
    .app-loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #22c55e33;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .app-loading-text {
      color: #7aaa80;
      font-size: 14px;
      font-weight: 600;
    }
    
    /* Install prompt */
    .install-prompt {
      position: fixed;
      bottom: 100px;
      left: 16px;
      right: 16px;
      max-width: 480px;
      margin: 0 auto;
      background: #22c55e;
      color: #061009;
      border-radius: 12px;
      padding: 14px 16px;
      z-index: 1000;
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .install-prompt button {
      background: #061009;
      color: #22c55e;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
    }
    
    .install-prompt button:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="app-loading">
      <div class="app-loading-spinner"></div>
      <div class="app-loading-text">Loading Money Reminder AI...</div>
    </div>
  </div>

  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('✅ Service Worker registered'))
          .catch(err => console.log('❌ Service Worker registration failed:', err));
      });
    }
    
    // Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showInstallPrompt();
    });
    
    function showInstallPrompt() {
      if (window.matchMedia('(display-mode: standalone)').matches) return;
      const prompt = document.createElement('div');
      prompt.className = 'install-prompt';
      prompt.innerHTML = `
        📱 Install Money Reminder AI
        <button onclick="installApp()">Install</button>
        <button onclick="this.parentElement.remove()" style="background: transparent; color: #061009; margin-left: auto;">✕</button>
      `;
      document.body.appendChild(prompt);
    }
    
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          document.querySelector('.install-prompt')?.remove();
        });
      }
    }
    
    // Storage API with IndexedDB fallback
    window.storage = {
      async get(key) {
        try {
          const item = localStorage.getItem(key);
          return item ? { value: item } : null;
        } catch {
          return this._getFromIndexedDB(key);
        }
      },
      async set(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch {
          return this._setToIndexedDB(key, value);
        }
      },
      async _getFromIndexedDB(key) {
        return new Promise((resolve) => {
          const db = indexedDB.open('MoneyReminderAI', 1);
          db.onsuccess = () => {
            const tx = db.result.transaction('data', 'readonly');
            const store = tx.objectStore('data');
            const req = store.get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(null);
          };
          db.onerror = () => resolve(null);
        });
      },
      async _setToIndexedDB(key, value) {
        return new Promise((resolve) => {
          const db = indexedDB.open('MoneyReminderAI', 1);
          db.onupgradeneeded = (e) => {
            if (!e.target.result.objectStoreNames.contains('data')) {
              e.target.result.createObjectStore('data');
            }
          };
          db.onsuccess = () => {
            const tx = db.result.transaction('data', 'readwrite');
            const store = tx.objectStore('data');
            store.put({ value }, key);
            resolve();
          };
          db.onerror = () => resolve();
        });
      }
    };
  </script>
  
  <!-- React & ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- App code -->
  <script type="text/babel" src="app.js"></script>
</body>
</html>
